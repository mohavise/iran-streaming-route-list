name: Update Iranian Streaming DNS Lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iran-streaming-list-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      IRAN_STREAMING_CRT_TIMEOUT: "8"
      IRAN_STREAMING_URLSCAN_TIMEOUT: "8"
      IRAN_STREAMING_PAGE_TIMEOUT: "8"
      IRAN_STREAMING_ENABLE_CRTSH: "1"
      IRAN_STREAMING_ENABLE_URLSCAN: "1"
      IRAN_STREAMING_ENABLE_PAGE_CRAWL: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and validate Iranian streaming list
        run: bash ./scripts/build-iran-streaming.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            iran-streaming-domains.txt \
            iran-streaming-urls.txt \
            services/iran-streaming/output/list-all.rsc

          if git diff --cached --quiet; then
            echo "No Iranian streaming list changes."
            exit 0
          fi

          git commit -m "Update Iranian streaming DNS route list"
          git pull --rebase origin main
          git push origin HEAD:main
