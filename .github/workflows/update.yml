name: Update Iranian Streaming DNS Lists

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      # Manual/database domains are the primary source.
      # Public discovery sources are optional enrichment only.
      IRAN_STREAMING_CRT_TIMEOUT: "8"
      IRAN_STREAMING_URLSCAN_TIMEOUT: "8"
      IRAN_STREAMING_PAGE_TIMEOUT: "8"
      IRAN_STREAMING_ENABLE_CRTSH: "1"
      IRAN_STREAMING_ENABLE_URLSCAN: "1"
      IRAN_STREAMING_ENABLE_PAGE_CRAWL: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq python3

      - name: Generate Iranian streaming DNS static list
        run: |
          chmod +x scripts/build-iran-streaming.sh
          ./scripts/build-iran-streaming.sh

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add iran-streaming-domains.txt iran-streaming-urls.txt services/iran-streaming/output/list-all.rsc

          if git diff --cached --quiet; then
            echo "No Iranian streaming DNS list changes"
          else
            git commit -m "Automatic Iranian streaming DNS route list update"
            git push
          fi
